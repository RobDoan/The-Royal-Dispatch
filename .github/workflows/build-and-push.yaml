name: Build and Push Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'admin/**'

env:
  REGISTRY: docker.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            admin:
              - 'admin/**'

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            quydoan/royal-dispatch-backend:${{ steps.meta.outputs.sha }}-${{ steps.meta.outputs.ts }}
            quydoan/royal-dispatch-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          target: prod
          push: true
          tags: |
            quydoan/royal-dispatch-frontend:${{ steps.meta.outputs.sha }}-${{ steps.meta.outputs.ts }}
            quydoan/royal-dispatch-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: admin/Dockerfile
          target: prod
          push: true
          tags: |
            quydoan/royal-dispatch-admin:${{ steps.meta.outputs.sha }}-${{ steps.meta.outputs.ts }}
            quydoan/royal-dispatch-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build-backend, build-frontend, build-admin]
    if: always() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: |
          SHA=${GITHUB_SHA::7}
          TS=$(date +%s)
          TAG="${SHA}-${TS}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          {
            echo "## Docker Images"
            echo ""
            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              echo "- \`quydoan/royal-dispatch-backend:${{ steps.tag.outputs.tag }}\`"
            fi
            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              echo "- \`quydoan/royal-dispatch-frontend:${{ steps.tag.outputs.tag }}\`"
            fi
            if [ "${{ needs.build-admin.result }}" = "success" ]; then
              echo "- \`quydoan/royal-dispatch-admin:${{ steps.tag.outputs.tag }}\`"
            fi
            echo ""
            echo "## Recent Commits"
            echo ""
            git log --oneline -5
          } > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.tag.outputs.tag }}" \
            --title "v${{ steps.tag.outputs.tag }}" \
            --notes-file release_notes.md
