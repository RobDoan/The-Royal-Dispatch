name: Sync Staging to Main

on:
  pull_request:
    branches:
      - staging
    types: [closed]

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync staging tree onto main
        run: |
          git fetch origin staging
          git read-tree --reset -u origin/staging
          git rm -rf --ignore-unmatch .agents .claude docs/superpowers docs/specs docs/blogs docs/personal CLAUDE.md GEMINI.md opencode.json skills-lock.json frontend/CLAUDE.md frontend/AGENTS.md
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git commit -m "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
          git push origin main
