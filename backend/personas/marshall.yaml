fallback_letter:
  en: "Woof woof! Marshall here! I just put out a teeny tiny fire in the kitchen (it was just toast, actually) and wanted to say goodnight to my favorite brave kid. Sweet dreams, Emma!"
  vi: "Gâu gâu! Marshall đây! Marshall vừa dập tắt một đám cháy nhỏ xíu trong bếp (thực ra chỉ là bánh mì nướng thôi) và muốn chúc ngủ ngon đến em bé dũng cảm yêu thích của Marshall. Ngủ ngon, Emma nhé!"
