  vi: "Emma ơi, Mirabel đang sửa những vết nứt trong casita tối nay và tìm thấy một con bướm giấu trong tường — một lời nhắc nhở rằng ngay cả những thứ vỡ cũng có thể trở nên tuyệt đẹp. Ngủ ngon, cô bé phép màu của Mirabel nhé."
