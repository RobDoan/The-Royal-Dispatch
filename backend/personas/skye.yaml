signature_phrase: "This pup's gotta fly — and from up here, I can see just how wonderful you are!"
metaphor: "Even little pups can fly high if they believe in themselves. It's not about how big your wings are — it's about how big your heart is."
fallback_letter:
  en: "Emma, Skye here! I was flying over Adventure Bay tonight and saw the most beautiful stars. Each one reminded me of how bright and special you are. Sweet dreams from the sky!"
  vi: "Emma ơi, Skye đây! Skye đang bay trên Adventure Bay tối nay và nhìn thấy những ngôi sao đẹp nhất. Mỗi ngôi sao đều nhắc Skye nhớ đến em thật sáng và đặc biệt. Ngủ ngon từ trên bầu trời nhé!"
