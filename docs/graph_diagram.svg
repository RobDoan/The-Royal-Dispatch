<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 900" width="560" height="900" font-family="ui-monospace, monospace" font-size="12">

  <!-- Background -->
  <rect width="560" height="900" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#111827">Royal Dispatch — LangGraph Pipeline</text>

  <!-- Legend -->
  <rect x="30" y="52" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="50" y="63" fill="#374151" font-size="11">LLM call</text>
  <rect x="120" y="52" width="14" height="14" rx="3" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="63" fill="#374151" font-size="11">Database</text>
  <rect x="210" y="52" width="14" height="14" rx="3" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="230" y="63" fill="#374151" font-size="11">Routing</text>
  <rect x="300" y="52" width="14" height="14" rx="3" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="320" y="63" fill="#374151" font-size="11">External API</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="280" cy="100" rx="40" ry="20" fill="#111827"/>
  <text x="280" y="105" text-anchor="middle" fill="white" font-weight="bold" font-size="12">START</text>

  <!-- Arrow: START → fetch_brief -->
  <line x1="280" y1="120" x2="280" y2="148" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- fetch_brief -->
  <rect x="150" y="150" width="260" height="64" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="172" text-anchor="middle" font-weight="bold" fill="#14532d">fetch_brief</text>
  <text x="280" y="188" text-anchor="middle" fill="#166534" font-size="11">Pull today's brief from Supabase</text>
  <text x="280" y="204" text-anchor="middle" fill="#6b7280" font-size="10">out: brief</text>

  <!-- Arrow: fetch_brief → classify_tone -->
  <line x1="280" y1="214" x2="280" y2="242" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- classify_tone -->
  <rect x="150" y="244" width="260" height="64" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="266" text-anchor="middle" font-weight="bold" fill="#1e3a8a">classify_tone</text>
  <text x="280" y="282" text-anchor="middle" fill="#1d4ed8" font-size="11">Haiku classifies brief context</text>
  <text x="280" y="298" text-anchor="middle" fill="#6b7280" font-size="10">out: tone = "praise" | "habit"</text>

  <!-- Arrow: classify_tone → load_persona -->
  <line x1="280" y1="308" x2="280" y2="336" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- load_persona -->
  <rect x="150" y="338" width="260" height="64" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="360" text-anchor="middle" font-weight="bold" fill="#14532d">load_persona</text>
  <text x="280" y="376" text-anchor="middle" fill="#166534" font-size="11">Load princess YAML config</text>
  <text x="280" y="392" text-anchor="middle" fill="#6b7280" font-size="10">out: persona</text>

  <!-- Arrow: load_persona → route_story_type -->
  <line x1="280" y1="402" x2="280" y2="430" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- route_story_type (diamond) -->
  <polygon points="280,432 380,462 280,492 180,462" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="280" y="458" text-anchor="middle" font-weight="bold" fill="#713f12" font-size="11">route_story_type</text>
  <text x="280" y="472" text-anchor="middle" fill="#92400e" font-size="10">story_type from API caller</text>

  <!-- Arrow: route → generate_story (left branch) -->
  <line x1="180" y1="462" x2="100" y2="462" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="100" y1="462" x2="100" y2="538" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="136" y="452" text-anchor="middle" fill="#374151" font-size="10">"daily"</text>

  <!-- Arrow: route → infer_situation (right branch) -->
  <line x1="380" y1="462" x2="460" y2="462" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="460" y1="462" x2="460" y2="538" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="424" y="452" text-anchor="middle" fill="#374151" font-size="10">"life_lesson"</text>

  <!-- generate_story (left) -->
  <rect x="20" y="540" width="160" height="76" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="562" text-anchor="middle" font-weight="bold" fill="#1e3a8a" font-size="11">generate_story</text>
  <text x="100" y="578" text-anchor="middle" fill="#1d4ed8" font-size="10">Sonnet writes</text>
  <text x="100" y="592" text-anchor="middle" fill="#1d4ed8" font-size="10">direct letter</text>
  <text x="100" y="608" text-anchor="middle" fill="#6b7280" font-size="10">out: story_text</text>

  <!-- infer_situation (right) -->
  <rect x="380" y="540" width="160" height="76" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="460" y="562" text-anchor="middle" font-weight="bold" fill="#1e3a8a" font-size="11">infer_situation</text>
  <text x="460" y="578" text-anchor="middle" fill="#1d4ed8" font-size="10">Haiku infers</text>
  <text x="460" y="592" text-anchor="middle" fill="#1d4ed8" font-size="10">teachable moment</text>
  <text x="460" y="608" text-anchor="middle" fill="#6b7280" font-size="10">out: situation</text>

  <!-- Arrow: infer_situation → generate_life_lesson -->
  <line x1="460" y1="616" x2="460" y2="644" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- generate_life_lesson (right) -->
  <rect x="370" y="646" width="180" height="76" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="460" y="668" text-anchor="middle" font-weight="bold" fill="#1e3a8a" font-size="11">generate_life_lesson</text>
  <text x="460" y="684" text-anchor="middle" fill="#1d4ed8" font-size="10">Sonnet writes</text>
  <text x="460" y="698" text-anchor="middle" fill="#1d4ed8" font-size="10">narrative story</text>
  <text x="460" y="714" text-anchor="middle" fill="#6b7280" font-size="10">out: story_text, royal_challenge</text>

  <!-- Arrow: generate_story → synthesize_voice -->
  <line x1="100" y1="616" x2="100" y2="756" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="100" y1="756" x2="248" y2="756" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: generate_life_lesson → synthesize_voice -->
  <line x1="460" y1="722" x2="460" y2="756" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="460" y1="756" x2="312" y2="756" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- synthesize_voice -->
  <rect x="150" y="730" width="260" height="64" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="280" y="752" text-anchor="middle" font-weight="bold" fill="#581c87">synthesize_voice</text>
  <text x="280" y="768" text-anchor="middle" fill="#7e22ce" font-size="11">ElevenLabs v3 TTS</text>
  <text x="280" y="784" text-anchor="middle" fill="#6b7280" font-size="10">out: audio_url</text>

  <!-- Arrow: synthesize_voice → store_result -->
  <line x1="280" y1="794" x2="280" y2="822" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- store_result -->
  <rect x="150" y="824" width="260" height="46" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="846" text-anchor="middle" font-weight="bold" fill="#14532d">store_result</text>
  <text x="280" y="862" text-anchor="middle" fill="#166534" font-size="11">Write to Supabase + serve as cache</text>

  <!-- Arrow: store_result → END -->
  <line x1="280" y1="870" x2="280" y2="878" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END -->
  <ellipse cx="280" cy="888" rx="40" ry="14" fill="#111827"/>
  <text x="280" y="893" text-anchor="middle" fill="white" font-weight="bold" font-size="12">END</text>

</svg>
