apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: royal-dispatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: quydoan/royal-dispatch-admin:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
