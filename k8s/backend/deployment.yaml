apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: royal-dispatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: quydoan/royal-dispatch-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: QDRANT_URL
              value: "http://qdrant.qdrant.svc.cluster.local:6333"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: ANTHROPIC_API_KEY
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: ELEVENLABS_API_KEY
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SUPABASE_SERVICE_KEY
            - name: SUPABASE_STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SUPABASE_STORAGE_BUCKET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: OPENAI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AUTH_SECRET
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: FRONTEND_URL
            - name: N8N_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: N8N_SHARED_SECRET
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
