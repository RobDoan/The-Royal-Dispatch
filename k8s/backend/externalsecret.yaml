apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: royal-dispatch
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: backend-secret
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: royal-dispatch
        property: ANTHROPIC_API_KEY
    - secretKey: ELEVENLABS_API_KEY
      remoteRef:
        key: royal-dispatch
        property: ELEVENLABS_API_KEY
    - secretKey: SUPABASE_URL
      remoteRef:
        key: royal-dispatch
        property: SUPABASE_URL
    - secretKey: SUPABASE_SERVICE_KEY
      remoteRef:
        key: royal-dispatch
        property: SUPABASE_SERVICE_KEY
    - secretKey: SUPABASE_STORAGE_BUCKET
      remoteRef:
        key: royal-dispatch
        property: SUPABASE_STORAGE_BUCKET
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: royal-dispatch
        property: OPENAI_API_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: royal-dispatch
        property: DATABASE_URL
    - secretKey: AUTH_SECRET
      remoteRef:
        key: royal-dispatch
        property: AUTH_SECRET
    - secretKey: FRONTEND_URL
      remoteRef:
        key: royal-dispatch
        property: FRONTEND_URL
    - secretKey: N8N_SHARED_SECRET
      remoteRef:
        key: royal-dispatch
        property: N8N_SHARED_SECRET
